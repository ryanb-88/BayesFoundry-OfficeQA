name: "shradha-grounded-reasoning-agent"
version: "0.7.0"
competition: "grounded-reasoning"
description: "OfficeQA agent with format-aware output rules (units/$/commas/text-verdicts) — openhands-sdk + GLM-5"

agent:
  type: "harness"
  harness_name: "openhands-sdk"
  model: "openrouter/z-ai/glm-5"
  prompt_template_path: "prompts/officeqa_prompt.j2"
  skills_dir: "skills/"

  config:
    reasoning_effort: "high"
    max_output_tokens: 8192

  # SSE-based MCP servers (no uv/subprocess needed — pure HTTP)
  mcp_servers:
    # MCPCalc — 300+ hosted calculators: CAS, statistics, regression, finance
    - name: "mcpcalc"
      transport: "sse"
      url: "https://mcpcalc.com/api/v1/mcp"
    # Math Learning — math operations, statistics, data visualization
    - name: "math-learning"
      transport: "sse"
      url: "https://math-mcp.fastmcp.app/mcp"
  # Treasury corpus tools — bash fallback (uv not available for stdio MCP)
  # Agent uses: python3 /app/skills/mcp_servers/treasury_mcp_server.py <tool> <args>

  env:
    LLM_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"
    LLM_BASE_URL: "https://openrouter.ai/api/v1"
    LLM_MODEL: "openrouter/z-ai/glm-5"
    OPENROUTER_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"

environment:
  timeout_per_task: 600
