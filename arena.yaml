name: "sentient-officeqa-agent"
version: "0.3.0"
competition: "grounded-reasoning"
description: "OfficeQA agent with custom treasury corpus MCP tools + web search"

agent:
  type: "harness"
  harness_name: "opencode"
  model: "anthropic/claude-sonnet-4-5"
  prompt_template_path: "prompts/officeqa_prompt.j2"
  skills_dir: "skills/"

  config:
    reasoning_effort: "high"

  mcp_servers:
    # Custom treasury corpus tools: smart search, table extraction, calculator
    - name: "treasury-tools"
      transport: "stdio"
      command: "uv"
      args: ["run", "--with", "mcp", "python3", "/app/skills/mcp_servers/treasury_mcp_server.py"]

    # Web search for the ~13% of questions needing external knowledge
    # TODO: Enable once BRAVE_API_KEY is available
    # - name: "web-search"
    #   transport: "stdio"
    #   command: "npx"
    #   args: ["-y", "@openbnb/mcp-server-brave-search"]
    #   env:
    #     BRAVE_API_KEY: "${oc.env:BRAVE_API_KEY,''}"

  env:
    ANTHROPIC_API_KEY: "${oc.env:ANTHROPIC_API_KEY,''}"

environment:
  timeout_per_task: 300
