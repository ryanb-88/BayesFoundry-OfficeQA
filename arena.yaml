name: "shradha-grounded-reasoning-agent"
version: "0.4.0"
competition: "grounded-reasoning"
description: "OfficeQA agent with custom treasury corpus tools — openhands-sdk + GLM-5"

agent:
  type: "harness"
  harness_name: "openhands-sdk"
  model: "openrouter/z-ai/glm-5"
  prompt_template_path: "prompts/officeqa_prompt.j2"
  skills_dir: "skills/"

  config:
    reasoning_effort: "high"
    # Tell openhands-sdk where to find our skills inside the container
    skill_paths:
      - "/app/skills"

  # MCP disabled for openhands-sdk (uv not available in container)
  # Agent uses bash fallback: python3 /app/skills/mcp_servers/treasury_mcp_server.py <tool> <args>
  # mcp_servers:
  #   - name: "treasury-tools"
  #     transport: "stdio"
  #     command: "uv"
  #     args: ["run", "--with", "mcp", "python3", "/app/skills/mcp_servers/treasury_mcp_server.py"]

  env:
    LLM_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"
    LLM_BASE_URL: "https://openrouter.ai/api/v1"
    LLM_MODEL: "openrouter/z-ai/glm-5"
    OPENROUTER_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"

environment:
  timeout_per_task: 300
