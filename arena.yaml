name: "shradha-grounded-reasoning-agent"
version: "0.9.0"
competition: "grounded-reasoning"
description: "OfficeQA agent — Goose harness + Claude Sonnet (Anthropic) + stdio treasury MCP + dynamic skill loading"

agent:
  type: "harness"
  harness_name: "goose"
  model: "anthropic/claude-3-5-sonnet-20241022"
  prompt_template_path: "prompts/officeqa_prompt.j2"
  skills_dir: "skills/"

  config:
    max_turns: 60

  # MCP servers: SSE-based external calculators + stdio treasury corpus tools
  mcp_servers:
    # MCPCalc — 300+ hosted calculators: CAS, statistics, regression, finance
    - name: "mcpcalc"
      transport: "sse"
      url: "https://mcpcalc.com/api/v1/mcp"
    # Math Learning — math operations, statistics, data visualization
    - name: "math-learning"
      transport: "sse"
      url: "https://math-mcp.fastmcp.app/mcp"
    # Treasury corpus tools — stdio MCP (FastMCP server; mcp package installed via wrapper)
    - name: "treasury"
      transport: "stdio"
      command: "bash"
      args:
        - "-c"
        - "pip install mcp -q 2>/dev/null; exec python3 /root/.config/goose/skills/mcp_servers/treasury_mcp_server.py"

  env:
    ANTHROPIC_API_KEY: "${oc.env:ANTHROPIC_API_KEY,''}"

environment:
  timeout_per_task: 600
