name: "bayes-reasoning-agent-openhands-mcp"
version: "0.2.0"
competition: "grounded-reasoning"

agent:
  type: "harness"
  harness_name: "openhands-sdk"
  # model: "openrouter/z-ai/glm-5"
  model: "openrouter/minimax/minimax-m2.5"
  # version: omitted to install latest openhands-sdk
  prompt_template_path: "prompts/officeqa_prompt.j2"
  skills_dir: "skills/"

  mcp_servers:
    # MCPCalc — 300+ hosted calculators including CAS, statistics, regression,
    # finance (NPV/IRR/CAGR), physics. Free, no auth, Streamable HTTP.
    - name: "mcpcalc"
      transport: "sse"
      url: "https://mcpcalc.com/api/v1/mcp"

    # Math Learning — math operations, statistics, data visualization.
    # Free, no auth, Streamable HTTP.
    - name: "math-learning"
      transport: "sse"
      url: "https://math-mcp.fastmcp.app/mcp"

  # Agent-specific settings (passthrough to constructor):
  # config:
  #   reasoning_effort: "high"

  env:
    OPENROUTER_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"  # empty default; set before running
    ANTHROPIC_API_KEY: "${oc.env:ANTHROPIC_API_KEY,''}"  # empty default; set before running
    LLM_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"  # openhands-sdk reads LLM_API_KEY
    LLM_BASE_URL: "https://openrouter.ai/api/v1"  # openhands-sdk needs base URL for OpenRouter

environment:
  memory: "4G"
  timeout_per_task: 600
